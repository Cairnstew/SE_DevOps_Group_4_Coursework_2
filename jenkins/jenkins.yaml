jenkins:
  systemMessage: "Jenkins managed by Configuration as Code"

  numExecutors: 2
  mode: NORMAL

  crumbIssuer:
    standard: {}

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@example.com"